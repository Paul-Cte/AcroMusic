security:
    password_hashers:
        Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface: 'auto'

    providers:
        app_user_provider:
            entity:
                class: App\Entity\User
                property: email

    firewalls:
        dev:
            pattern: ^/(_profiler|_wdt|assets|build)/
            security: false

        # 1. Gère la connexion et la création du Token
        login:
            pattern: ^/api/login
            stateless: true
            json_login:
                check_path: /api/login_check
                success_handler: lexik_jwt_authentication.handler.authentication_success
                failure_handler: lexik_jwt_authentication.handler.authentication_failure

        # 2. Protège le reste de l'API
        api:
            pattern: ^/api
            stateless: true
            jwt: ~

    access_control:
        # Autorise la connexion
        - { path: ^/api/login, roles: PUBLIC_ACCESS }

        # Autorise la lecture des albums et compositeurs pour tout le monde
        - { path: ^/api/albums, methods: [GET], roles: PUBLIC_ACCESS }
        - { path: ^/api/compositeurs, methods: [GET], roles: PUBLIC_ACCESS }

        # Bloque tout le reste (création/modif) si pas connecté
        - { path: ^/api, roles: IS_AUTHENTICATED_FULLY }

when@test:
    security:
        password_hashers:
            Symfony\Component\Security\Core\User\PasswordAuthenticatedUserInterface:
                algorithm: auto
                cost: 4
                time_cost: 3
                memory_cost: 10
